        <path d="M2 1.5h9a1.8 1.8 0 0 1 1.8 1.8v4.2A1.8 1.8 0 0 1 11 9.3H6.7l-2.2 1.7V9.3H2A1.8 1.8 0 0 1 .2 7.5V3.3A1.8 1.8 0 0 1 2 1.5Z"/>
