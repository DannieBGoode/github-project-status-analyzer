<svg xmlns="http://www.w3.org/2000/svg" width="1329" height="282" viewBox="0 0 1329 282" role="img" aria-labelledby="title desc">
  <title id="title">Report metadata redesign preview</title>
  <desc id="desc">Dark theme preview of the report detail header with redesigned metadata cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#03130e"/>
      <stop offset="100%" stop-color="#071712"/>
