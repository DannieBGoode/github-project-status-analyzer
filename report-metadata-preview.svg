    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1f1a"/>
      <stop offset="100%" stop-color="#10231d"/>
    </linearGradient>
    <linearGradient id="metaA" x1="0" y1="0" x2="0" y2="1">
